[eval-sparse]
seed_range = [0, 10]
datasets = ["lung", "composite", "lamino"]
image_range = [10, 110]
total_intensity_values = [1e4, 1e5, 1e6, 1e7, 1e8, 1e9]
models = ["fbp", "mle", "unet", "unet_ensemble", "diffusion"]
schedule_length = 32
num_angles = 200
max_angle = 180


[eval.mle]
lr = 1e-1
patience = 50
max_steps = 100
tv_weight = 0.0

[eval.map]
lr = 1e-1
patience = 50
max_steps = 100
tv_weight = -1.0

[eval.unet]
member = 0

[eval.diffusion]
gradient_steps = 20
guidance_lr = 1e-2
replicates = 16
cond = true

[eval-sparse.bootstrapping]
methods = ["fbp", "unet"]
n_bootstraps = 1000
intensities = [1e4, 1e5, 1e6, 1e7, 1e8, 1e9]
seed_range = [0, 10]

[eval-sparse.equivariant_bootstrapping]
# Estimator is always FBPUNet (member 0). Defaults follow Tachella & Pereyra
# (AISTATS 2024) tomography setting: helper_fcns.bootstrap with max_angle=8,
# max_shift=0, no flips, MC=100.
n_bootstraps = 100
intensities = [1e4, 1e5, 1e6, 1e7, 1e8, 1e9]
seed_range = [0, 10]
rotation_std_deg = 8.0
flip = false

[eval-sparse.skrock]
# SK-ROCK Langevin sampler (Pereyra, Vargas-Mieles & Zygalakis, SIIMS 2020),
# run via deepinv's SKRockIterator + LogPoissonLikelihood (uqct.other_methods.skrock).
# Paper hyperparameters (kept for reference): s=10, eta=0.05, dt just below the
# stability bound l_s / L, single chain x 1e3 post-burn-in samples, Moreau-Yosida
# envelope of the TV prior with lambda = 1/L_f. The TV weight beta is the log-linear
# MAP heuristic of uqct.models.iterative; scripts/calibrate_skrock.py (ECE on the
# first 10 test images, alpha=0.05) found the bare heuristic over-covers
# (cov@95 ~ 0.99) and that ~2x it minimises ECE (cov@95 ~ 0.93-0.96) -- hence
# tv_weight_calibration = 2.0. Set tv_weight_calibration = 1.0 for the bare heuristic
# (paper-spirit beta). Per-cell deviations from 2x go under
# [[eval-sparse.skrock.calibrated]] (also written by scripts/calibrate_skrock.py;
# uqct.eval.cli uses those if present, else tv_weight_calibration).
intensities = [1e4, 1e5, 1e6, 1e7, 1e8, 1e9]
seed_range = [0, 10]
n_burnin = 1000
n_samples = 1000
n_stages = 10
eta = 0.05
dt_perc = 0.95
prior = "tv"          # "tv" (Moreau-Yosida TV) or "none" (MLE Langevin; not recommended)
tv_weight = -1.0      # -1 = auto: tv_weight_calibration x heuristic(total_intensity)
tv_weight_calibration = 2.0   # 2.0 = ECE-calibrated; 1.0 = bare MAP heuristic (paper)
my_lambda_factor = 1.0
chambolle_iters = 25
lipschitz_iters = 40
sampler_seed = 0

